name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$TAG_NAME" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_NAME) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

          if [ "$TAG_NAME" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_NAME) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build plugin
        run: pnpm build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            manifest.json
            main.js
            styles.css
